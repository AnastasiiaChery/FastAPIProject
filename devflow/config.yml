# devflow project configuration
# Commit this file — it defines how devflow behaves in this repo

jira:
  project: SCRUM                          # Jira project key
  server: https://zamorenanastya.atlassian.net
  in_review_status: "In Review"           # exact Jira status name for "in code review"

github:
  default_branch: main                    # base branch for PRs
  draft_pr: true                          # open PRs as draft; set to false to open ready PRs

code:
  language: python                        # python | typescript | go
  test_framework: pytest                  # pytest | unittest | jest
  test_dir: tests/                        # where tests live
  src_dir: .                              # where source code lives

paths:
  plans: docs/plans/                      # implementation plans and root-cause docs
  investigations: docs/investigations/    # findings docs for Spike/Investigation tickets
